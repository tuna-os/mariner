name: Publish Flatpak

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Install aarch64 GNOME SDK (for cross-build)
        run: |
          flatpak install --noninteractive flathub org.gnome.Sdk/aarch64/50 2>&1 | tail -3 || true

      - name: Build x86_64
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: org.tunaos.mariner.json
          cache-key: flatpak-builder-${{ github.sha }}-x86_64
          build-bundle: false
          upload-artifact: false

      - name: Export x86_64 OCI
        run: |
          flatpak build-bundle --oci --arch=x86_64 repo mariner-x86_64.oci org.tunaos.mariner

      - name: Build aarch64
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: org.tunaos.mariner.json
          cache-key: flatpak-builder-${{ github.sha }}-aarch64
          build-bundle: false
          upload-artifact: false
          arch: aarch64

      - name: Export aarch64 OCI
        run: |
          flatpak build-bundle --oci --arch=aarch64 repo mariner-aarch64.oci org.tunaos.mariner

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mariner-oci
          path: mariner-*.oci/
          retention-days: 1

  publish:
    name: Publish
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: mariner-oci
          path: mariner-oci

      - name: Push to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | skopeo login ghcr.io -u "${{ github.actor }}" --password-stdin
          skopeo copy oci:mariner-oci/mariner-x86_64.oci docker://ghcr.io/tuna-os/mariner:latest-x86_64
          skopeo copy oci:mariner-oci/mariner-aarch64.oci docker://ghcr.io/tuna-os/mariner:latest-aarch64

      - name: Update index
        run: |
          git clone --depth 1 \
            https://x-access-token:${{ secrets.FLATPAK_INDEX_TOKEN }}@github.com/tuna-os/docs.git \
            index-repo
          pip install requests

          python3 .github/scripts/update-index.py \
            --oci-dir mariner-oci/mariner-x86_64.oci \
            --index-file index-repo/static/flatpak/index/static \
            --repo-name tuna-os/mariner \
            --tags latest

          python3 .github/scripts/update-index.py \
            --oci-dir mariner-oci/mariner-aarch64.oci \
            --index-file index-repo/static/flatpak/index/static \
            --repo-name tuna-os/mariner \
            --tags latest

          cd index-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/flatpak/index/static
          if git diff --cached --quiet; then echo "No index changes"
          else
            git commit -m "chore(flatpak): update Mariner OCI index [${{ github.ref_name }}]"
            git push origin main
          fi
