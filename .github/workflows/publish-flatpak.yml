name: Publish Flatpak

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-oci:
    strategy:
      matrix:
        arch: [x86_64, aarch64]
    name: Build (${{ matrix.arch }})
    runs-on: ubuntu-latest
    steps:
      - name: Setup QEMU for aarch64
        if: matrix.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3

      - uses: actions/checkout@v4

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: org.tunaos.mariner.json
          cache-key: flatpak-builder-${{ github.sha }}-${{ matrix.arch }}
          build-bundle: false
          upload-artifact: false
          arch: ${{ matrix.arch }}

      - name: Export OCI
        run: |
          flatpak build-bundle --oci --arch=${{ matrix.arch }} repo mariner-${{ matrix.arch }}.oci org.tunaos.mariner

      - name: Upload OCI artifact
        uses: actions/upload-artifact@v4
        with:
          name: mariner-oci-${{ matrix.arch }}
          path: mariner-${{ matrix.arch }}.oci/
          retention-days: 1

  publish:
    name: Publish
    needs: build-oci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: mariner-oci-x86_64
          path: mariner-oci-x86_64

      - uses: actions/download-artifact@v4
        with:
          name: mariner-oci-aarch64
          path: mariner-oci-aarch64

      - name: Push to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | skopeo login ghcr.io -u "${{ github.actor }}" --password-stdin
          skopeo copy oci:mariner-oci-x86_64 docker://ghcr.io/tuna-os/mariner:latest-x86_64
          skopeo copy oci:mariner-oci-aarch64 docker://ghcr.io/tuna-os/mariner:latest-aarch64

      - name: Update index
        run: |
          git clone --depth 1 \
            https://x-access-token:${{ secrets.FLATPAK_INDEX_TOKEN }}@github.com/tuna-os/docs.git \
            index-repo
          pip install requests

          python3 .github/scripts/update-index.py \
            --oci-dir mariner-oci-x86_64 \
            --index-file index-repo/static/flatpak/index/static \
            --repo-name tuna-os/mariner \
            --tags latest

          python3 .github/scripts/update-index.py \
            --oci-dir mariner-oci-aarch64 \
            --index-file index-repo/static/flatpak/index/static \
            --repo-name tuna-os/mariner \
            --tags latest

          cd index-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/flatpak/index/static
          if git diff --cached --quiet; then echo \"No index changes\"
          else
            git commit -m "chore(flatpak): update Mariner OCI index [${{ github.ref_name }}]"
            git push origin main
          fi
